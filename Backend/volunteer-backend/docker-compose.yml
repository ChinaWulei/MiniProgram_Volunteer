services:
  app:
    build: .
    image: volunteer-backend:1.0.0
    container_name: volunteer-backend
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_REGION: ${AWS_S3_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}

      AI_PROVIDER: ${AI_PROVIDER}
      AI_API_KEY: ${AI_API_KEY}
      AI_MODEL: ${AI_MODEL}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL}
      AI_BASE_URL: ${AI_BASE_URL}


      AI_IMAGE_API_KEY: ${AI_IMAGE_API_KEY}
      AI_IMAGE_BASE_URL: ${AI_IMAGE_BASE_URL}
      AI_IMAGE_MODEL: ${AI_IMAGE_MODEL}

      RAG_VECTOR_DATASOURCE_URL: ${RAG_VECTOR_DATASOURCE_URL}
      RAG_VECTOR_DATASOURCE_USERNAME: ${RAG_VECTOR_DATASOURCE_USERNAME}
      RAG_VECTOR_DATASOURCE_PASSWORD: ${RAG_VECTOR_DATASOURCE_PASSWORD}
      RAG_EMBEDDING_DIMENSIONS: ${RAG_EMBEDDING_DIMENSIONS}

      WECHAT_MINIAPP_SECRET: ${WECHAT_MINIAPP_SECRET}




      TZ: Asia/Shanghai
    ports:
      - "8080:8080"
