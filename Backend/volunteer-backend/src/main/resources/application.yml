server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/volunteer_service?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_general_ci&serverTimezone=Asia/Shanghai&connectTimeout=5000&socketTimeout=10000}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 5000
      validation-timeout: 3000
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

app:
  auth:
    token-prefix: volunteer-token-
  aws:
    s3:
      bucket: ${AWS_S3_BUCKET:}
      region: ${AWS_S3_REGION:}
      access-key: ${AWS_ACCESS_KEY_ID:}
      secret-key: ${AWS_SECRET_ACCESS_KEY:}
  ai:
    provider: ${AI_PROVIDER:mock}
    api-key: ${AI_API_KEY:}
    base-url: ${AI_BASE_URL:}
    model: ${AI_MODEL:}
    embedding-model: ${AI_EMBEDDING_MODEL:text-embedding-004}
    image-api-key: ${AI_IMAGE_API_KEY:}
    image-base-url: ${AI_IMAGE_BASE_URL:}
    image-model: ${AI_IMAGE_MODEL:imagen-3.0-generate-002}
  rag:
    vector:
      url: ${RAG_VECTOR_DATASOURCE_URL:jdbc:postgresql://localhost:5432/volunteer_rag}
      username: ${RAG_VECTOR_DATASOURCE_USERNAME:postgres}
      password: ${RAG_VECTOR_DATASOURCE_PASSWORD:postgres}
    chunk-size: ${RAG_CHUNK_SIZE:900}
    chunk-overlap: ${RAG_CHUNK_OVERLAP:160}
    top-k: ${RAG_TOP_K:5}
    embedding-dimensions: ${RAG_EMBEDDING_DIMENSIONS:768}

logging:
  level:
    com.scs.volunteer: INFO
