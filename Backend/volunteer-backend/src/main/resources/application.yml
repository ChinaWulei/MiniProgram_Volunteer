server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/volunteer_service?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_general_ci&serverTimezone=Asia/Shanghai&connectTimeout=5000&socketTimeout=10000}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 5000
      validation-timeout: 3000
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

app:
  auth:
    token-prefix: volunteer-token-
  aws:
    s3:
      bucket: ${AWS_S3_BUCKET:}
      region: ${AWS_S3_REGION:}
      access-key: ${AWS_ACCESS_KEY_ID:}
      secret-key: ${AWS_SECRET_ACCESS_KEY:}
  ai:
    provider: ${AI_PROVIDER:mock}
    api-key: ${AI_API_KEY:}
    base-url: ${AI_BASE_URL:}
    model: ${AI_MODEL:}

logging:
  level:
    com.scs.volunteer: INFO
